<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- primary favicon / mobile app icon using the rocket plane SVG -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- SEO meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Retro Aviator Crash is a provably fair crash game built with Cloudflare Workers. Bet on a multiplier, cash out before it's too late! Real-time gameplay with durable state and retro styling." />
    <meta name="keywords" content="crash game, betting game, provably fair, retro aviator, Cloudflare Workers, multiplayer, React, TypeScript" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Retro Aviator Crash" />
    <meta property="og:description" content="A thrilling retro-style provably fair crash game built on Cloudflare Workers. Cash out before the plane crashes!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="theme-color" content="#000000" />
    <title>Retro Aviator Crash</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
        window.addEventListener('error', (event) => {
          const isOurAppError = event.filename && event.filename.startsWith(window.location.origin);
          if (isOurAppError) {
            navigator.sendBeacon('/api/client-errors', JSON.stringify({
              message: event.message,
              url: window.location.href,
              userAgent: navigator.userAgent,
              source: event.filename,
              lineno: event.lineno,
              colno: event.colno,
              stack: event.error ? event.error.stack : null,
              timestamp: new Date().toISOString()
            }));
          }
        }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
